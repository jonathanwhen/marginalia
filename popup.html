<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 320px; background: #0a0a0a; color: #e0e0e0; }

    .header { padding: 11px 14px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 8px; }
    .header .logo { font-size: 16px; }
    .header .title { font-size: 13px; font-weight: 600; color: #fff; flex: 1; }
    .header .pg-count { font-size: 11px; color: #555; }

    .tabs { display: flex; border-bottom: 1px solid #1e1e1e; }
    .tab { flex: 1; padding: 9px 4px; text-align: center; font-size: 11px; cursor: pointer; color: #555; border: none; background: none; transition: color 0.15s; }
    .tab.active { color: #fff; border-bottom: 2px solid #e8a87c; }
    .tab:hover { color: #aaa; }

    .panel { display: none; padding: 12px 14px 14px; }
    .panel.active { display: block; }

    .field { margin-bottom: 9px; }
    label { display: block; font-size: 10px; color: #555; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
    input, textarea {
      width: 100%; background: #141414; border: 1px solid #252525;
      border-radius: 5px; color: #e0e0e0; font-size: 12px; padding: 7px 9px;
      outline: none; transition: border 0.15s;
    }
    input:focus, textarea:focus { border-color: #e8a87c; }
    textarea { resize: none; }
    input[readonly] { color: #555; font-size: 11px; cursor: default; }

    /* Tags */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 20px;
      border: 1px solid #2a2a2a; background: #141414; color: #666;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .tag-btn.selected { background: #2a1f14; border-color: #e8a87c; color: #e8a87c; }

    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }

    .send-btn {
      width: 100%; background: #e8a87c; color: #0a0a0a; border: none;
      border-radius: 6px; padding: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }

    .toast { display: none; padding: 7px 14px; font-size: 11px; text-align: center; }
    .toast.success { color: #6fcf97; }
    .toast.error { color: #eb5757; }

    .settings-link {
      display: block; text-align: center; padding: 7px;
      font-size: 10px; color: #333; text-decoration: none;
      border-top: 1px solid #161616;
    }
    .settings-link:hover { color: #555; }

    /* Highlights list */
    .hl-list { max-height: 200px; overflow-y: auto; }
    .hl-item {
      padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 11px;
    }
    .hl-item:last-child { border-bottom: none; }
    .hl-quote { color: #e8a87c; font-style: italic; margin-bottom: 3px; }
    .hl-comment { color: #888; }
    .hl-empty { color: #444; font-size: 11px; padding: 16px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦞</span>
    <span class="title">OpenClaw</span>
    <span class="pg-count" id="today-count">Today: 0 pg</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="log">📚 Log</button>
    <button class="tab" data-tab="highlights">✏️ Highlights</button>
    <button class="tab" data-tab="note">📝 Note</button>
  </div>

  <!-- Log reading -->
  <div class="panel active" id="panel-log">
    <div class="field">
      <label>Title</label>
      <input type="text" id="log-title" placeholder="Auto-filled from page" />
    </div>
    <div class="row">
      <div class="field">
        <label>Author</label>
        <input type="text" id="log-author" placeholder="—" />
      </div>
      <div class="field">
        <label>Pages read</label>
        <input type="number" id="log-pages" placeholder="0" min="1" />
      </div>
    </div>
    <div class="field">
      <label>Source URL</label>
      <input type="text" id="log-url" readonly />
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tags-wrap" id="tags-wrap">
        <button class="tag-btn" data-tag="AI/ML Research">AI/ML</button>
        <button class="tag-btn" data-tag="Healthcare/Bio">Healthcare</button>
        <button class="tag-btn" data-tag="General Learning">General</button>
        <button class="tag-btn" data-tag="Framework/Mental Model">Framework</button>
        <button class="tag-btn" data-tag="Future Exploration">Future Exp.</button>
        <button class="tag-btn" data-tag="To Revisit">Revisit</button>
      </div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="log-notes" rows="3" placeholder="Key takeaways..."></textarea>
    </div>
    <button class="send-btn" id="log-send">Log Reading</button>
  </div>

  <!-- Highlights for this page -->
  <div class="panel" id="panel-highlights">
    <div class="hl-list" id="hl-list">
      <div class="hl-empty">No highlights on this page yet.<br>Select text to highlight.</div>
    </div>
  </div>

  <!-- General note -->
  <div class="panel" id="panel-note">
    <div class="field">
      <label>Note</label>
      <textarea id="note-input" rows="5" placeholder="Quick thought, idea, or insight..."></textarea>
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tags-wrap" id="note-tags-wrap">
        <button class="tag-btn" data-tag="AI/ML Research">AI/ML</button>
        <button class="tag-btn" data-tag="Healthcare/Bio">Healthcare</button>
        <button class="tag-btn" data-tag="General Learning">General</button>
        <button class="tag-btn" data-tag="Framework/Mental Model">Framework</button>
        <button class="tag-btn" data-tag="Future Exploration">Future Exp.</button>
      </div>
    </div>
    <button class="send-btn" id="note-send">Send Note</button>
  </div>

  <div class="toast" id="toast"></div>
  <a href="#" class="settings-link" id="open-settings">⚙ Settings</a>

  <script src="popup.js"></script>
</body>
</html>
