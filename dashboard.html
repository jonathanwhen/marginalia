<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenClaw — Reading Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .header .logo { font-size: 22px; }
    .header .title { font-size: 18px; font-weight: 600; color: #fff; }
    .header .count { font-size: 12px; color: #555; margin-left: auto; }

    /* Search */
    .search-wrap { margin-bottom: 18px; }
    .search-wrap input {
      width: 100%; background: #141414; border: 1px solid #252525;
      border-radius: 6px; color: #e0e0e0; font-size: 13px; padding: 10px 14px;
      outline: none; transition: border 0.15s;
    }
    .search-wrap input:focus { border-color: #e8a87c; }
    .search-wrap input::placeholder { color: #444; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 10px; color: #555; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 1px solid #1e1e1e;
      cursor: pointer; user-select: none; white-space: nowrap; transition: color 0.15s;
    }
    thead th:hover { color: #888; }
    thead th .sort-arrow { font-size: 9px; margin-left: 3px; color: #e8a87c; }

    tbody tr.row { cursor: pointer; transition: background 0.1s; }
    tbody tr.row:hover { background: #111; }
    tbody td {
      padding: 9px 10px; font-size: 12px; border-bottom: 1px solid #141414;
      vertical-align: top; max-width: 0;
    }
    /* Column widths */
    .col-title { width: 28%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-author { width: 14%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-tags { width: 18%; }
    .col-pages { width: 7%; text-align: right; }
    .col-notes { width: 18%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-hl { width: 5%; text-align: right; }
    .col-date { width: 10%; white-space: nowrap; color: #555; }

    .tag {
      display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 10px;
      background: #1a1510; border: 1px solid #2a2218; color: #e8a87c;
      margin: 1px 2px; white-space: nowrap;
    }
    .notes-preview { color: #777; }
    .hl-count { color: #e8a87c; font-weight: 600; }

    /* Detail row */
    tr.detail-row { display: none; }
    tr.detail-row.open { display: table-row; }
    tr.detail-row td { padding: 14px 10px 18px; border-bottom: 1px solid #1e1e1e; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .detail-section h4 {
      font-size: 10px; color: #555; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 8px;
    }
    .detail-meta { font-size: 12px; line-height: 1.7; }
    .detail-meta .meta-label { color: #555; }
    .detail-meta a { color: #e8a87c; text-decoration: none; word-break: break-all; }
    .detail-meta a:hover { text-decoration: underline; }
    .detail-notes { font-size: 12px; color: #aaa; line-height: 1.6; white-space: pre-wrap; margin-top: 8px; }

    .detail-hl-list { list-style: none; max-height: 300px; overflow-y: auto; }
    .detail-hl-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 11px; }
    .detail-hl-item:last-child { border-bottom: none; }
    .detail-hl-quote { color: #e8a87c; font-style: italic; }
    .detail-hl-comment { color: #888; margin-top: 3px; }
    .detail-hl-empty { color: #444; font-size: 11px; }

    /* Delete button in detail row */
    .detail-actions { margin-top: 14px; }
    .delete-btn {
      background: none; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #555; font-size: 11px; padding: 6px 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .delete-btn:hover { color: #eb5757; border-color: #eb5757; }
    .delete-btn.confirm { color: #eb5757; border-color: #eb5757; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px; color: #444;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }
    .empty-state .hint { font-size: 12px; color: #333; margin-top: 8px; }

    /* Scrollbar styling for detail highlight lists */
    .detail-hl-list::-webkit-scrollbar { width: 4px; }
    .detail-hl-list::-webkit-scrollbar-track { background: transparent; }
    .detail-hl-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🦞</span>
      <span class="title">OpenClaw — Reading Log</span>
      <span class="count" id="total-count"></span>
    </div>

    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search by title, author, tags, or notes..." />
    </div>

    <div id="table-wrap">
      <!-- Table or empty state rendered by JS -->
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
