<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marginalia — Reading Log</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface-2: #161616;
      --border: #1e1e1e;
      --border-2: #252525;
      --text: #e0e0e0;
      --text-2: #999;
      --text-3: #555;
      --text-4: #333;
      --accent: #e8a87c;
      --accent-dim: rgba(232, 168, 124, 0.15);
      --green: #6fcf97;
      --red: #eb5757;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

    /* ── Nav ── */
    .page-nav {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 32px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 50;
    }
    .page-nav .nav-brand {
      font-size: 16px; margin-right: 12px; text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .page-nav .nav-brand-icon { font-size: 16px; }
    .page-nav .nav-brand-text { font-size: 13px; font-weight: 700; color: #fff; }
    .page-nav a {
      font-size: 12px; color: var(--text-3); text-decoration: none;
      padding: 5px 12px; border-radius: 5px; transition: all 0.15s;
      font-weight: 500;
    }
    .page-nav a:hover { color: var(--text); background: var(--surface-2); }
    .page-nav a.active { color: var(--accent); background: var(--accent-dim); }
    .page-nav .nav-spacer { flex: 1; }
    .nav-sync-btn { background:none; border:1px solid #3a3a4a; color:#888; font-size:12px; cursor:pointer; padding:4px 12px; border-radius:6px; font-family:inherit; transition:all .15s; }
    .nav-sync-btn:hover { color:#e8a87c; border-color:#e8a87c; }
    .nav-sync-btn.syncing { color:#e8a87c; opacity:.7; cursor:wait; }

    /* ── Header ── */
    .dash-header { display: flex; align-items: center; margin-bottom: 36px; }
    .dash-brand { display: flex; align-items: center; gap: 12px; }
    .dash-logo { font-size: 28px; }
    .dash-title {
      font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.02em;
    }
    .dash-subtitle { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .dash-count { margin-left: auto; font-size: 12px; color: var(--text-3); }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 36px;
    }
    .stat-card {
      background: linear-gradient(135deg, rgba(232, 168, 124, 0.04), transparent 60%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; transition: border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .stat-card:hover { border-color: var(--border-2); box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    .stat-value {
      font-size: 32px; font-weight: 700; color: #fff;
      letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .stat-label {
      font-size: 11px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.08em;
      position: relative; z-index: 1; display: flex; align-items: center; gap: 6px;
    }
    .stat-trend {
      font-size: 10px; font-weight: 600; letter-spacing: 0;
      text-transform: none;
    }
    .stat-trend.up { color: var(--green); }
    .stat-trend.down { color: var(--red); }
    .stat-trend.flat { color: var(--text-4); }
    .sparkline {
      position: absolute; bottom: 0; right: 0;
      width: 55%; height: 55%; pointer-events: none;
    }

    /* ── Section Titles ── */
    .section-title {
      font-size: 11px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
    }

    /* ── Heatmap ── */
    .heatmap-section { margin-bottom: 36px; }
    .heatmap-container { display: flex; gap: 8px; overflow-x: auto; }
    .hm-day-labels {
      display: grid; grid-template-rows: repeat(7, 12px);
      gap: 3px; padding-top: 20px;
    }
    .hm-day-label {
      font-size: 9px; color: var(--text-4); line-height: 12px;
      text-align: right; width: 24px;
    }
    .hm-grid-wrap { flex: 1; min-width: 0; }
    .hm-months { display: flex; height: 17px; position: relative; margin-bottom: 3px; }
    .hm-month-label { position: absolute; font-size: 9px; color: var(--text-3); }
    .hm-grid {
      display: grid; grid-template-rows: repeat(7, 12px);
      grid-auto-flow: column; grid-auto-columns: 12px; gap: 3px;
    }
    .hm-cell {
      width: 12px; height: 12px; border-radius: 3px;
      position: relative; cursor: default;
    }
    .hm-cell:hover { outline: 1px solid var(--text-3); outline-offset: -1px; }
    .hm-cell[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%); background: #222; color: var(--text);
      padding: 4px 8px; border-radius: 4px; font-size: 10px;
      white-space: nowrap; pointer-events: none; z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .hm-legend {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 4px; margin-top: 8px; font-size: 9px; color: var(--text-4);
    }
    .hm-legend-cell { width: 12px; height: 12px; border-radius: 3px; }
    .hm-0 { background: var(--surface-2); }
    .hm-1 { background: rgba(232, 168, 124, 0.2); }
    .hm-2 { background: rgba(232, 168, 124, 0.4); }
    .hm-3 { background: rgba(232, 168, 124, 0.65); }
    .hm-4 { background: rgba(232, 168, 124, 0.9); }

    /* ── Divider ── */
    .section-divider {
      height: 1px; margin-bottom: 28px; opacity: 0.3;
      background: linear-gradient(to right, var(--accent), transparent 80%);
    }

    /* ── Toolbar ── */
    .readings-toolbar {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .search-wrap { flex: 0 0 280px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px;
      padding: 9px 28px 9px 12px; outline: none;
      transition: border 0.15s; font-family: var(--font);
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-4); }
    .search-hint {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--text-4); background: var(--surface-2);
      padding: 2px 6px; border-radius: 3px; border: 1px solid var(--border);
      pointer-events: none; transition: opacity 0.15s;
    }
    .search-wrap input:focus + .search-hint,
    .search-wrap input:not(:placeholder-shown) + .search-hint { opacity: 0; }
    .tag-filters { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .tag-pill {
      font-size: 10px; padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-3); cursor: pointer; transition: all 0.15s;
      font-family: var(--font); white-space: nowrap;
    }
    .tag-pill:hover { border-color: var(--border-2); color: var(--text-2); }

    /* ── Table ── */
    #table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 10px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
      transition: color 0.15s; font-weight: 500;
    }
    thead th:hover { color: var(--text-2); }
    thead th .sort-arrow { font-size: 9px; margin-left: 3px; color: var(--accent); }
    tbody tr.row { cursor: pointer; transition: background 0.15s; }
    tbody tr.row:hover { background: rgba(232, 168, 124, 0.03); }
    tbody td {
      padding: 10px 12px; font-size: 12px;
      border-bottom: 1px solid #0f0f0f; vertical-align: middle;
    }
    tbody tr.row td:first-child {
      border-left: 3px solid var(--row-accent, transparent);
    }
    .col-title { width: 30%; color: #fff; font-weight: 500; }
    .col-title .title-text {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .row-progress {
      height: 2px; background: var(--surface-2); border-radius: 1px;
      margin-top: 5px; width: 100%;
    }
    .row-progress-fill {
      height: 100%; border-radius: 1px; transition: width 0.3s ease;
      background: linear-gradient(90deg, var(--accent), rgba(232, 168, 124, 0.4));
    }
    .col-author {
      width: 15%; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--text-2);
    }
    .col-tags { width: 22%; }
    .col-pages { width: 8%; text-align: right; color: var(--text-2); }
    .col-hl { width: 8%; text-align: center; }
    .col-date { width: 12%; white-space: nowrap; color: var(--text-3); }
    .col-actions { width: 5%; text-align: center; }
    .row-delete {
      background: none; border: none; color: var(--text-3);
      font-size: 18px; cursor: pointer; padding: 4px 8px;
      border-radius: 4px; transition: all 0.15s; line-height: 1;
      opacity: 0; /* visible on row hover */
    }
    tbody tr.row:hover .row-delete { opacity: 1; }
    .row-delete:hover { color: var(--red); background: rgba(235, 87, 87, 0.1); }
    .row-delete.confirm { color: var(--red); opacity: 1; }
    .tag {
      display: inline-block; font-size: 9px; padding: 2px 7px;
      border-radius: 10px; border: 1px solid; margin: 1px 2px; white-space: nowrap;
    }
    .hl-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px;
      border-radius: 10px; font-size: 10px; font-weight: 600;
    }
    .hl-badge.has-hl { background: var(--accent-dim); color: var(--accent); }
    .hl-badge.no-hl { color: var(--text-4); }

    /* ── Detail Row ── */
    tr.detail-row { display: none; }
    tr.detail-row.open { display: table-row; }
    tr.detail-row td { padding: 0 12px 20px; border-bottom: 1px solid var(--border); }
    .detail-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-top: 8px;
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    .detail-section-title {
      font-size: 10px; color: var(--text-3); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 12px; font-weight: 500;
    }
    .detail-meta { font-size: 12px; line-height: 1.8; }
    .detail-meta .meta-row { display: flex; gap: 8px; }
    .detail-meta .meta-label { color: var(--text-3); flex-shrink: 0; min-width: 60px; }
    .detail-meta .meta-value { color: var(--text); }
    .detail-meta a { color: var(--accent); text-decoration: none; word-break: break-all; }
    .detail-meta a:hover { text-decoration: underline; }
    .detail-notes {
      font-size: 12px; color: var(--text-2); line-height: 1.7;
      white-space: pre-wrap; margin-top: 16px; padding: 14px;
      background: var(--bg); border-radius: 6px; border: 1px solid var(--border);
    }
    .detail-hl-list {
      list-style: none; max-height: 400px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .detail-hl-item {
      padding: 10px 12px; background: var(--bg); border-radius: 6px;
      border-left: 2px solid var(--accent); font-size: 11px;
    }
    .detail-hl-quote { color: var(--accent); font-style: italic; line-height: 1.5; }
    .detail-hl-comment {
      color: var(--text-2); margin-top: 6px; padding-top: 6px;
      border-top: 1px solid var(--border); font-style: normal;
    }
    .detail-hl-latex { margin: 4px 0; }
    .detail-hl-latex .katex { color: var(--text); font-size: 0.95em; }
    .detail-hl-comment .katex { color: var(--text-2); }
    .katex-display { margin: 4px 0; overflow-x: auto; }
    .detail-hl-empty { color: var(--text-4); font-size: 11px; padding: 12px 0; }
    .detail-header {
      display: flex; justify-content: flex-end; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .delete-btn {
      background: rgba(235, 87, 87, 0.08); border: 1px solid rgba(235, 87, 87, 0.3); border-radius: 5px;
      color: var(--red); font-size: 12px; padding: 8px 18px;
      cursor: pointer; transition: all 0.15s; font-family: var(--font); font-weight: 500;
    }
    .delete-btn:hover { background: rgba(235, 87, 87, 0.15); border-color: var(--red); }
    .delete-btn.confirm { background: rgba(235, 87, 87, 0.2); border-color: var(--red); }

    /* ── Reading Progress ── */
    .reading-progress {
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .rp-summary {
      font-size: 12px; color: var(--text-2); margin-bottom: 12px;
    }
    .rp-bar {
      height: 4px; background: var(--surface-2); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    .rp-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), rgba(232, 168, 124, 0.5));
      transition: width 0.3s ease;
    }
    .rp-form {
      display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
    }
    .rp-form input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); font-size: 12px; padding: 6px 10px;
      font-family: var(--font); outline: none; transition: border 0.15s;
    }
    .rp-form input:focus { border-color: var(--accent); }
    .rp-date { width: 140px; }
    .rp-pages { width: 80px; }
    .rp-log-btn {
      background: var(--accent-dim); border: 1px solid rgba(232, 168, 124, 0.3);
      border-radius: 5px; color: var(--accent); font-size: 12px;
      padding: 6px 14px; cursor: pointer; font-weight: 600;
      font-family: var(--font); transition: all 0.15s;
    }
    .rp-log-btn:hover { background: rgba(232, 168, 124, 0.25); border-color: var(--accent); }
    .rp-entries {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-height: 120px; overflow-y: auto;
    }
    .rp-entry {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      padding: 4px 8px; font-size: 11px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .rp-entry:hover { border-color: var(--border-2); }
    .rp-entry-date { color: var(--text-3); }
    .rp-entry-pages { color: var(--accent); font-weight: 600; }
    .rp-entry-del {
      background: none; border: none; color: var(--text-4);
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
      transition: color 0.15s;
    }
    .rp-entry-del:hover { color: var(--red); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-4); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; color: var(--text-3); }
    .empty-state .hint { font-size: 12px; color: var(--text-4); margin-top: 8px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

    /* ── Animation ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeIn 0.4s ease-out both; }
    .stats-grid .stat-card:nth-child(1) { animation-delay: 0ms; }
    .stats-grid .stat-card:nth-child(2) { animation-delay: 60ms; }
    .stats-grid .stat-card:nth-child(3) { animation-delay: 120ms; }
    .stats-grid .stat-card:nth-child(4) { animation-delay: 180ms; }
  </style>
  <link rel="stylesheet" href="search-modal.css">
  <link rel="stylesheet" href="lib/katex.min.css">
</head>
<body>
  <nav class="page-nav">
    <span class="nav-brand"><span class="nav-brand-icon">✦</span><span class="nav-brand-text">Marginalia</span></span>
    <a href="dashboard.html" class="active">Reading Log</a>
    <a href="library.html">Library</a>
    <a href="graph.html">Knowledge Graph</a>
    <span class="nav-spacer"></span>
    <button class="nav-search-btn" onclick="window.__searchModalToggle && window.__searchModalToggle()" title="Search (⌘K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="nav-search-kbd">&#8984;K</span>
    </button>
    <button id="nav-export-btn" class="nav-sync-btn" title="Export to Obsidian">Export</button>
    <button id="nav-sync-btn" class="nav-sync-btn" title="Sync Now (⌘⇧S)">Sync</button>
    <a href="options.html">Settings</a>
  </nav>
  <div class="dashboard">
    <header class="dash-header">
      <div class="dash-brand">
        <span class="dash-logo">✦</span>
        <div>
          <h1 class="dash-title">Reading Log</h1>
          <p class="dash-subtitle">Your reading activity at a glance</p>
        </div>
      </div>
      <span class="dash-count" id="total-count"></span>
    </header>

    <section class="stats-grid" id="stats-grid"></section>

    <section class="heatmap-section">
      <h3 class="section-title">Activity</h3>
      <div class="heatmap-container">
        <div class="hm-day-labels" id="hm-day-labels"></div>
        <div class="hm-grid-wrap">
          <div class="hm-months" id="hm-months"></div>
          <div class="hm-grid" id="hm-grid"></div>
        </div>
      </div>
      <div class="hm-legend">
        <span>Less</span>
        <div class="hm-legend-cell hm-0"></div>
        <div class="hm-legend-cell hm-1"></div>
        <div class="hm-legend-cell hm-2"></div>
        <div class="hm-legend-cell hm-3"></div>
        <div class="hm-legend-cell hm-4"></div>
        <span>More</span>
      </div>
    </section>

    <div class="section-divider"></div>

    <div class="readings-toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search readings..." />
        <span class="search-hint">/</span>
      </div>
      <div class="tag-filters" id="tag-filters"></div>
    </div>

    <div id="table-wrap"></div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/export.js"></script>
  <script src="lib/katex.min.js"></script>
  <script src="dashboard.js"></script>
  <script src="nav-sync.js"></script>
  <script src="lib/minisearch.min.js"></script>
  <script src="search-modal.js"></script>
</body>
</html>
