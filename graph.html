<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marginalia — Knowledge Graph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background: #0a0a0a; color: #e0e0e0; overflow: hidden; }

    /* Nav */
    .page-nav {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 32px; border-bottom: 1px solid #1e1e1e;
      background: #0a0a0a; position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    }
    .page-nav .nav-brand {
      font-size: 16px; margin-right: 12px; text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .page-nav .nav-brand-icon { font-size: 16px; }
    .page-nav .nav-brand-text { font-size: 13px; font-weight: 700; color: #fff; }
    .page-nav a {
      font-size: 12px; color: #555; text-decoration: none;
      padding: 5px 12px; border-radius: 5px; transition: all 0.15s;
      font-weight: 500;
    }
    .page-nav a:hover { color: #e0e0e0; background: #161616; }
    .page-nav a.active { color: #e8a87c; background: rgba(232, 168, 124, 0.15); }
    .page-nav .nav-spacer { flex: 1; }
    .nav-sync-btn { background:none; border:1px solid #3a3a4a; color:#888; font-size:12px; cursor:pointer; padding:4px 12px; border-radius:6px; font-family:inherit; transition:all .15s; }
    .nav-sync-btn:hover { color:#e8a87c; border-color:#e8a87c; }
    .nav-sync-btn.syncing { color:#e8a87c; opacity:.7; cursor:wait; }

    /* Toolbar */
    .graph-toolbar {
      position: fixed; top: 50px; left: 0; right: 0; z-index: 40;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 32px;
      background: #0a0a0a; border-bottom: 1px solid #1e1e1e;
    }
    .graph-toolbar button {
      background: none; border: 1px solid #333; color: #e0e0e0;
      border-radius: 5px; padding: 5px 14px; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .graph-toolbar button:hover { border-color: #e8a87c; color: #e8a87c; }
    .graph-toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .graph-toolbar select {
      background: #161616; border: 1px solid #333; color: #e0e0e0;
      border-radius: 5px; padding: 5px 10px; font-size: 12px; outline: none;
    }
    .graph-toolbar .toolbar-status {
      font-size: 11px; color: #666; margin-left: auto;
    }

    /* SVG */
    #graph-svg { width: 100vw; height: calc(100vh - 90px); margin-top: 90px; }
    .node-label {
      font-size: 10px; fill: #aaa; pointer-events: none;
      text-anchor: middle; dominant-baseline: central;
    }
    .node-label-reading { font-size: 11px; fill: #fff; font-weight: 600; }
    .edge { stroke: #333; stroke-opacity: 0.6; }
    .edge-shared { stroke: #e8a87c; stroke-opacity: 0.3; }

    /* Detail sidebar */
    .graph-detail {
      position: fixed; top: 90px; right: 0; width: 320px;
      height: calc(100vh - 90px); background: #111; border-left: 1px solid #1e1e1e;
      overflow-y: auto; padding: 16px; display: none; z-index: 30;
    }
    .graph-detail.open { display: block; }
    .graph-detail h3 { font-size: 14px; color: #fff; margin-bottom: 8px; }
    .graph-detail .detail-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; color: #555; cursor: pointer; font-size: 16px;
    }
    .graph-detail .detail-meta { font-size: 11px; color: #666; margin-bottom: 12px; }
    .graph-detail .detail-concepts { list-style: none; padding: 0; }
    .graph-detail .detail-concepts li {
      font-size: 12px; padding: 3px 0; color: #aaa;
      border-bottom: 1px solid #1a1a1a;
    }
    .graph-detail .detail-concepts li .concept-type {
      font-size: 10px; color: #555; margin-left: 6px;
    }

    /* Tooltip */
    .graph-tooltip {
      position: fixed; background: #222; border: 1px solid #333;
      border-radius: 6px; padding: 6px 10px; font-size: 11px;
      color: #e0e0e0; pointer-events: none; z-index: 100;
      display: none; max-width: 260px;
    }
  </style>
</head>
<body>
  <nav class="page-nav">
    <span class="nav-brand"><span class="nav-brand-icon">✦</span><span class="nav-brand-text">Marginalia</span></span>
    <a href="dashboard.html">Reading Log</a>
    <a href="library.html">Library</a>
    <a href="graph.html" class="active">Knowledge Graph</a>
    <span class="nav-spacer"></span>
    <button id="nav-sync-btn" class="nav-sync-btn" title="Sync Now (⌘⇧S)">Sync</button>
    <a href="options.html">Settings</a>
  </nav>

  <div class="graph-toolbar">
    <button id="btn-extract-all">Extract All</button>
    <button id="btn-refresh">Refresh</button>
    <select id="filter-select">
      <option value="all">All</option>
      <option value="readings">Readings only</option>
      <option value="concepts">Concepts only</option>
    </select>
    <span class="toolbar-status" id="status-text"></span>
  </div>

  <svg id="graph-svg"></svg>

  <div class="graph-detail" id="detail-panel">
    <button class="detail-close" id="detail-close">&times;</button>
    <h3 id="detail-title"></h3>
    <div class="detail-meta" id="detail-meta"></div>
    <ul class="detail-concepts" id="detail-concepts"></ul>
  </div>

  <div class="graph-tooltip" id="tooltip"></div>

  <script src="lib/d3.v7.min.js"></script>
  <script src="graph.js"></script>
  <script src="nav-sync.js"></script>
</body>
</html>
