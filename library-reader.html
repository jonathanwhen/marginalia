<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marginalia — Reader</title>
  <link rel="stylesheet" href="library-reader.css">
  <link rel="stylesheet" href="lib/katex.min.css">
</head>
<body>
  <nav class="page-nav">
    <span class="nav-brand"><span class="nav-brand-icon">✦</span><span class="nav-brand-text">Marginalia</span></span>
    <a href="dashboard.html">Reading Log</a>
    <a href="library.html" class="active">Library</a>
    <a href="graph.html">Knowledge Graph</a>
    <span class="nav-spacer"></span>
    <a href="options.html">Settings</a>
  </nav>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <a href="library.html" class="toolbar-back" title="Back to Library">&larr;</a>
      <span class="toolbar-title" id="toolbar-title">Loading...</span>
      <button class="toolbar-edit-btn" id="btn-edit-meta" title="Edit title &amp; author (E)">&#9998;</button>
      <span class="toolbar-author" id="toolbar-author"></span>
    </div>
    <div class="toolbar-center">
      <button class="toolbar-btn" id="btn-search" title="Find in document (⌘F)">Find</button>
      <span class="toolbar-divider"></span>
      <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out">−</button>
      <span class="toolbar-zoom" id="zoom-level">150%</span>
      <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in">+</button>
      <span class="toolbar-status" id="status-text"></span>
    </div>
    <div class="toolbar-right">
      <div class="color-picker" id="color-picker">
        <button class="color-dot active" data-color="orange" title="Orange"></button>
        <button class="color-dot" data-color="green" title="Green"></button>
        <button class="color-dot" data-color="blue" title="Blue"></button>
        <button class="color-dot" data-color="pink" title="Pink"></button>
      </div>
      <span class="toolbar-divider"></span>
      <button class="toolbar-btn" id="btn-highlight-mode" title="Toggle highlight mode (H)">Highlight</button>
      <div class="export-wrap">
        <button class="toolbar-btn export-btn" id="btn-export" title="Copy highlights + notes">Copy <span class="export-caret">▾</span></button>
        <div class="export-menu hidden" id="export-menu" role="menu">
          <button data-fmt="markdown" role="menuitem">
            <span class="export-menu-label">Markdown</span>
            <span class="export-menu-sub">Highlights, comments, notes</span>
          </button>
          <button data-fmt="json" role="menuitem">
            <span class="export-menu-label">JSON</span>
            <span class="export-menu-sub">Structured (for tooling)</span>
          </button>
          <button data-fmt="text" role="menuitem">
            <span class="export-menu-label">Plain text</span>
            <span class="export-menu-sub">Quotes only</span>
          </button>
        </div>
      </div>
      <button class="toolbar-btn" id="btn-share" title="Share annotations">Share</button>
      <button class="toolbar-btn" id="btn-claude" title="Discuss with Claude">Claude</button>
      <button class="toolbar-btn" id="btn-sidebar" title="Toggle notes sidebar">Notes</button>
    </div>
  </div>

  <!-- Meta edit panel -->
  <div class="meta-edit-panel hidden" id="meta-edit-panel">
    <div class="meta-field">
      <label>Title</label>
      <input type="text" id="meta-title" placeholder="Title" />
    </div>
    <div class="meta-field">
      <label>Author</label>
      <input type="text" id="meta-author" placeholder="Author" />
    </div>
    <div class="meta-actions">
      <button class="meta-save" id="meta-save">Save</button>
      <button class="meta-cancel" id="meta-cancel">Cancel</button>
    </div>
  </div>

  <!-- Search bar -->
  <div class="search-bar hidden" id="search-bar">
    <input type="text" id="search-input" placeholder="Find in document..." />
    <span class="search-count" id="search-count"></span>
    <button class="search-nav" id="search-prev" title="Previous match (Shift+Enter)">↑</button>
    <button class="search-nav" id="search-next" title="Next match (Enter)">↓</button>
    <button class="search-close" id="search-close" title="Close (Esc)">✕</button>
  </div>

  <!-- Main content area -->
  <div id="main">
    <div id="viewer-container">
      <div id="viewer"></div>
    </div>

    <!-- Sidebar -->
    <div class="reader-sidebar hidden" id="sidebar">
      <div class="sb-header">
        <span class="sb-label">Notes</span>
        <div class="sb-tabs">
          <button class="sb-tab active" data-tab="edit">Edit</button>
          <button class="sb-tab" data-tab="preview">Preview</button>
        </div>
        <button class="sb-close" id="sb-close" title="Close (Esc)">&times;</button>
      </div>
      <div class="sb-body">
        <div class="sb-edit-pane" id="sb-edit-pane">
          <div class="sb-format-bar" id="sb-format-bar">
            <button class="sb-fmt-btn" data-fmt="h2" title="Heading">H</button>
            <button class="sb-fmt-btn sb-fmt-bold" data-fmt="bold" title="Bold (⌘B)">B</button>
            <button class="sb-fmt-btn sb-fmt-italic" data-fmt="italic" title="Italic (⌘I)">I</button>
            <span class="sb-fmt-divider"></span>
            <button class="sb-fmt-btn" data-fmt="ul" title="Bullet list">• List</button>
            <button class="sb-fmt-btn" data-fmt="ol" title="Numbered list">1. List</button>
            <button class="sb-fmt-btn" data-fmt="task" title="Task / checkbox">☐</button>
            <span class="sb-fmt-divider"></span>
            <button class="sb-fmt-btn" data-fmt="quote" title="Blockquote">&gt;</button>
            <button class="sb-fmt-btn" data-fmt="code" title="Inline code">&lt;/&gt;</button>
            <button class="sb-fmt-btn" data-fmt="link" title="Link">🔗</button>
          </div>
          <textarea class="sb-textarea" id="sb-notes" placeholder="Key takeaways, thoughts, or insights... (supports Markdown and $LaTeX$)"></textarea>
        </div>
        <div class="sb-preview-pane hidden" id="sb-preview-pane"></div>
        <div class="sb-status" id="sb-status"></div>
        <div class="sb-divider"></div>
        <div class="sb-hl-header" id="sb-hl-header">Highlights (0)</div>
        <div class="sb-hl-list" id="sb-hl-list">
          <div class="sb-hl-empty">No highlights yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Highlight toolbar (appears on text selection) -->
  <div id="hl-toolbar" class="hidden">
    <span>✦</span>
    <button id="hl-btn-highlight">Highlight</button>
    <div class="hl-divider"></div>
    <button id="hl-btn-comment">+ Comment</button>
  </div>

  <!-- Annotation popup -->
  <div id="ann-popup" class="hidden">
    <input type="text" id="ann-input" placeholder="Add a note... (Enter to save, Esc to skip)" />
  </div>

  <!-- Note bubble -->
  <div id="note-bubble" class="hidden"></div>

  <!-- Highlight mode banner -->
  <div class="mode-banner hidden" id="mode-banner">
    <span class="banner-icon">✦</span>
    <span class="banner-text">Highlight mode — select text to highlight</span>
    <button class="banner-exit" id="banner-exit">✕ Done</button>
  </div>

  <!-- Toast notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/dompurify.min.js"></script>
  <script src="lib/katex.min.js"></script>
  <script type="module" src="library-reader.js"></script>
</body>
</html>
